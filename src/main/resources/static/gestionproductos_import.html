<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Importación masiva de productos - SNIKER Admin">
    <title>Importar Productos - SNIKER Admin</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="CSS/gestionproductos.css">
    <script src="JS/auth-check.js"></script>
</head>

<body>
    <aside class="barra-lateral" id="barraLateral">
        <a href="index.html" class="seccion-logo" style="text-decoration: none; color: inherit; display: flex;">
            <div class="icono-logo"></div>
            <span class="texto-logo">SNIKER</span>
        </a>
        <nav>
            <ul class="menu-nav">
                <li class="item-nav"><a href="dashboard.html" class="enlace-nav"><span class="icono-nav">📊</span><span class="texto-nav">Dashboard</span></a></li>
                <li class="item-nav"><a href="ventas.html" class="enlace-nav"><span class="icono-nav">💰</span><span class="texto-nav">Ventas</span></a></li>
                <li class="item-nav"><a href="gestionpedidos.html" class="enlace-nav"><span class="icono-nav">🚛</span><span class="texto-nav">Pedidos</span></a></li>
                <li class="item-nav"><a href="gestionproductos.html" class="enlace-nav"><span class="icono-nav">👟</span><span class="texto-nav">Productos</span></a></li>
                <li class="item-nav"><a href="gestionproductos_import.html" class="enlace-nav activo"><span class="icono-nav">📁</span><span class="texto-nav">Importar</span></a></li>
                <li class="item-nav"><a href="inventario.html" class="enlace-nav"><span class="icono-nav">📦</span><span class="texto-nav">Inventario</span></a></li>
                <li class="item-nav"><a href="gestionusuarios.html" class="enlace-nav"><span class="icono-nav">👥</span><span class="texto-nav">Usuarios</span></a></li>
                <li class="item-nav"><a href="reportes.html" class="enlace-nav"><span class="icono-nav">📈</span><span class="texto-nav">Reportes</span></a></li>
                <li><a href="reembolsos.html" class="enlace-nav"><span class="icono-nav">💸</span><span class="texto-nav">Reembolsos</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="contenido-principal">
        <header class="encabezado-dashboard">
            <h1 class="titulo-seccion">Importación Masiva de Productos</h1>
            <div class="perfil-usuario">
                <div class="avatar-usuario">A</div>
                <div>
                    <div style="font-weight: 700; font-size: 14px;">Admin</div>
                    <div style="font-size: 12px; color: var(--texto-gris);">Administrador</div>
                </div>
            </div>
        </header>

        <div class="area-contenido">
            <div class="contenedor-tabla" style="padding: 24px; gap: 16px;">
                <div class="encabezado-tabla" style="flex-wrap: wrap; gap: 12px; align-items: center;">
                    <h2 class="titulo-tabla">Carga de Productos por Archivo</h2>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <a class="boton-accion-tabla" href="gestionproductos.html">Volver a Productos</a>
                        <a class="boton-accion-tabla" href="/admin/import/template/csv">Descargar plantilla CSV</a>
                        <a class="boton-accion-tabla" href="/admin/import/template/xlsx">Descargar plantilla Excel</a>
                    </div>
                </div>

                <form id="importForm" class="grid-formulario" style="grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="grupo-formulario ancho-completo">
                        <label for="importFile">Archivo (.csv, .xlsx, .xls) *</label>
                        <input type="file" id="importFile" accept=".csv,.xlsx,.xls" required>
                    </div>
                    <div class="grupo-formulario ancho-completo">
                        <label for="importMode">Modo de importación</label>
                        <select id="importMode" class="filtro-select">
                            <option value="skip">Saltar duplicados por SKU</option>
                            <option value="update">Actualizar productos existentes</option>
                        </select>
                    </div>
                    <div class="grupo-formulario ancho-completo">
                        <button type="button" class="boton-nuevo-producto" id="previewButton">Previsualizar archivo</button>
                    </div>
                    <div class="grupo-formulario ancho-completo">
                        <button type="button" class="boton-nuevo-producto" id="confirmButton">Importar productos</button>
                    </div>
                </form>

                <div id="importMessage" style="margin-top: 12px;"></div>

                <div id="importErrors" style="background: rgba(255, 0, 0, 0.08); border: 1px solid rgba(255, 0, 0, 0.16); padding: 16px; display:none; max-height: 220px; overflow:auto;"></div>

                <div id="importPreview" style="overflow:auto; margin-top: 16px;"></div>

                <div id="confirmResult" style="margin-top: 16px;"></div>
            </div>
        </div>
    </main>

    <div class="notificacion" id="notificacion"></div>
    <script src="JS/import-products.js"></script>
</body>

</html>
