<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de Reembolsos - Dashboard Admin SNIKER">
    <title>Gestión de Reembolsos - SNIKER Admin</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="CSS/ventas2.css">
    <!-- AUTH CHECK - Route Protection -->
    <script src="JS/auth-check.js"></script>
    <style>
        .badge-refund-pending {
            background-color: var(--warning-orange);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .action-approve {
            color: var(--success-green);
        }

        .action-reject {
            color: var(--danger-red);
        }
    </style>
</head>

<body>
    <!-- SIDEBAR -->
    <aside class="barra-lateral">
        <a href="index.html" class="seccion-logo" style="text-decoration: none; color: inherit; display: flex;">
            <div class="icono-logo"></div>
            <span class="texto-logo">SNIKER</span>
        </a>

        <nav>
            <ul class="menu-nav">
                <li>
                    <a href="dashboard.html" class="enlace-nav">
                        <span class="icono-nav">📊</span>
                        <span class="texto-nav">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="ventas.html" class="enlace-nav">
                        <span class="icono-nav">💰</span>
                        <span class="texto-nav">Ventas</span>
                    </a>
                </li>
                <li>
                    <a href="gestionpedidos.html" class="enlace-nav">
                        <span class="icono-nav">🚛</span>
                        <span class="texto-nav">Pedidos</span>
                    </a>
                </li>
                <li>
                    <a href="domicilios.html" class="enlace-nav">
                        <span class="icono-nav">✈️</span>
                        <span class="texto-nav">Domicilios</span>
                    </a>
                </li>
                <li>
                    <a href="gestionproductos.html" class="enlace-nav">
                        <span class="icono-nav">👟</span>
                        <span class="texto-nav">Productos</span>
                    </a>
                </li>
                <li>
                    <a href="inventario.html" class="enlace-nav">
                        <span class="icono-nav">📦</span>
                        <span class="texto-nav">Inventario</span>
                    </a>
                </li>
                <li>
                    <a href="gestionusuarios.html" class="enlace-nav">
                        <span class="icono-nav">👥</span>
                        <span class="texto-nav">Usuarios</span>
                    </a>
                </li>
                <li>
                    <a href="reportes.html" class="enlace-nav">
                        <span class="icono-nav">📈</span>
                        <span class="texto-nav">Reportes</span>
                    </a>
                </li>
                <li>
                    <a href="reembolsos.html" class="enlace-nav activo">
                        <span class="icono-nav">💸</span>
                        <span class="texto-nav">Reembolsos</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="contenido-principal">
        <!-- HEADER -->
        <header class="encabezado-dashboard">
            <h1 class="titulo-seccion">Gestión de Reembolsos</h1>
        </header>

        <!-- ÁREA DE CONTENIDO -->
        <div class="area-contenido">
            <!-- TABLA -->
            <div class="contenedor-tabla">
                <div class="encabezado-tabla">
                    <h2 class="titulo-tabla">Solicitudes de Reembolso</h2>
                </div>

                <table class="tabla-ventas" id="tablaReembolsos">
                    <thead>
                        <tr>
                            <th>ID Pedido</th>
                            <th>Cliente</th>
                            <th>Motivo</th>
                            <th>Monto</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaReembolsos">
                        <!-- Dynamic Content -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Rechazo -->
    <div class="modal" id="modalRechazo">
        <div class="contenido-modal">
            <div class="encabezado-modal">
                <h3 class="titulo-modal" style="color: var(--rojo-error);">Rechazar Reembolso</h3>
                <button class="boton-cerrar" onclick="cerrarModalRechazo()">✕</button>
            </div>
            <div class="cuerpo-modal">
                <input type="hidden" id="rechazoOrderId">
                <div class="grupo-formulario">
                    <label class="etiqueta-formulario" for="motivoRechazo">Motivo del rechazo *</label>
                    <textarea id="motivoRechazo" class="input-formulario" style="height: 120px; resize: none;" placeholder="Explique por qué se rechaza la solicitud..." required></textarea>
                </div>
            </div>
            <div class="pie-modal">
                <button class="boton-secundario" onclick="cerrarModalRechazo()">Cancelar</button>
                <button class="boton-primario" onclick="confirmarRechazo()" style="background: linear-gradient(135deg, var(--rojo-error), #d9264c); color: var(--texto-blanco);">Confirmar Rechazo</button>
            </div>
        </div>
    </div>

    <script src="JS/reembolsos.js"></script>
</body>

</html>
